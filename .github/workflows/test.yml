name: Tests
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  test:
    if: github.repository == 'tracedown/lacelang-kt-validator' && !startsWith(github.event.pull_request.title, 'WIP:')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ["17", "21"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
      - name: Build and test
        run: ./gradlew build test

  conformance:
    if: github.repository == 'tracedown/lacelang-kt-validator' && !startsWith(github.event.pull_request.title, 'WIP:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Build fat JAR
        run: ./gradlew shadowJar
      - name: Clone lacelang spec repo
        run: git clone --depth 1 https://github.com/tracedown/lacelang.git ../lacelang
      - name: Install OpenSSL dev
        run: sudo apt-get update && sudo apt-get install -y libssl-dev
      - name: Build conformance harness
        run: cd ../lacelang/testkit/src && make
      - name: Generate TLS test certs
        run: mkdir -p /tmp/lace-certs && sh ../lacelang/testkit/certs/generate-certs.sh /tmp/lace-certs
      - name: Run conformance suite
        run: ../lacelang/testkit/src/build/lace-conformance -m lace-executor.toml --vectors ../lacelang/testkit/vectors --certs-dir /tmp/lace-certs
