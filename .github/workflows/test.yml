name: Tests
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  test:
    if: github.repository == 'tracedown/lacelang-kt-validator' && !startsWith(github.event.pull_request.title, 'WIP:')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ["17", "21"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
      - name: Build and test
        run: ./gradlew build test
